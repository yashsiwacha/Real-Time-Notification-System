server:
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:400}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:50}
    accept-count: ${TOMCAT_ACCEPT_COUNT:1000}
    max-connections: ${TOMCAT_MAX_CONNECTIONS:20000}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/notifications}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:80}
      minimum-idle: ${DB_MIN_IDLE:20}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:2000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:60000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      url: ${REDIS_URL:}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: ${KAFKA_PRODUCER_RETRIES:20}
      properties:
        linger.ms: 10
        batch.size: 65536
        compression.type: lz4
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "com.epam.notifications.domain"
        spring.json.value.default.type: "com.epam.notifications.domain.NotificationMessage"

notification:
  kafka:
    enabled: ${KAFKA_ENABLED:false}
    topic: ${KAFKA_TOPIC:notifications.created}
    group-id: ${KAFKA_GROUP_ID:notification-dispatcher}
    partitions: ${KAFKA_TOPIC_PARTITIONS:6}
    replicas: ${KAFKA_TOPIC_REPLICAS:1}
    consumer-concurrency: ${KAFKA_CONSUMER_CONCURRENCY:6}
    delivery-attempts: ${KAFKA_DELIVERY_ATTEMPTS:3}
    retry-delay-ms: ${KAFKA_RETRY_DELAY_MS:1000}
    retry-multiplier: ${KAFKA_RETRY_MULTIPLIER:2.0}
    retry-max-delay-ms: ${KAFKA_RETRY_MAX_DELAY_MS:30000}
  dispatcher:
    poll-size: 200
    max-attempts: 8
    base-backoff-ms: 300
    circuit-breaker:
      failure-threshold: ${DISPATCHER_CB_FAILURE_THRESHOLD:40}
      open-duration-ms: ${DISPATCHER_CB_OPEN_DURATION_MS:15000}
  backpressure:
    max-pending: ${BACKPRESSURE_MAX_PENDING:100000}
  rate-limit:
    capacity: ${RATE_LIMIT_CAPACITY:5000}
    refill-per-second: ${RATE_LIMIT_REFILL_PER_SECOND:5000}

app:
  security:
    api-key: ${API_KEY:}
    require-api-key: true
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:8080}
    jwt-secret: ${JWT_SECRET:dev-notification-jwt-secret-dev-notification-jwt-secret}
    jwt-expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
    admin:
      username: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD:admin123}
    user:
      username: ${USER_USERNAME:user}
      password: ${USER_PASSWORD:user123}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
