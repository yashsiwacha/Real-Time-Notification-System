spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/notifications}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      url: ${REDIS_URL:}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}

notification:
  dispatcher:
    poll-size: 200
    max-attempts: 8
    base-backoff-ms: 300

app:
  security:
    api-key: ${API_KEY:}
    require-api-key: true
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:8080}
