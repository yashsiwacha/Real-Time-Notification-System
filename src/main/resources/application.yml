server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/notifications;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 10
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "com.epam.notifications.domain"
        spring.json.value.default.type: "com.epam.notifications.domain.NotificationMessage"
    listener:
      ack-mode: record

notification:
  kafka:
    enabled: ${KAFKA_ENABLED:false}
    topic: ${KAFKA_TOPIC:notifications.created}
    group-id: ${KAFKA_GROUP_ID:notification-dispatcher}
    partitions: ${KAFKA_TOPIC_PARTITIONS:6}
    replicas: ${KAFKA_TOPIC_REPLICAS:1}
    consumer-concurrency: ${KAFKA_CONSUMER_CONCURRENCY:3}
    delivery-attempts: ${KAFKA_DELIVERY_ATTEMPTS:5}
    retry-delay-ms: ${KAFKA_RETRY_DELAY_MS:500}
    retry-multiplier: ${KAFKA_RETRY_MULTIPLIER:2.0}
    retry-max-delay-ms: ${KAFKA_RETRY_MAX_DELAY_MS:30000}
  queue:
    key-prefix: notification
  dispatcher:
    poll-size: 50
    max-attempts: 5
    base-backoff-ms: 500
    recovery-batch-size: 500
    circuit-breaker:
      failure-threshold: ${DISPATCHER_CB_FAILURE_THRESHOLD:20}
      open-duration-ms: ${DISPATCHER_CB_OPEN_DURATION_MS:10000}
  backpressure:
    max-pending: ${BACKPRESSURE_MAX_PENDING:50000}
  rate-limit:
    capacity: 10
    refill-per-second: 5

app:
  security:
    api-key: ${API_KEY:}
    require-api-key: false
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080}
    jwt-secret: ${JWT_SECRET:dev-notification-jwt-secret-dev-notification-jwt-secret}
    jwt-expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
    admin:
      username: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD:admin123}
    user:
      username: ${USER_USERNAME:user}
      password: ${USER_PASSWORD:user123}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: notification-system

logging:
  pattern:
    level: "%5p [requestId=%X{requestId}]"
