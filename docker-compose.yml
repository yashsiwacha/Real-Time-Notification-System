services:
  postgres:
    image: postgres:16
    container_name: notification-postgres
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: notifications
      POSTGRES_PASSWORD: notifications
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifications -d notifications"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: notification-redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: notification-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/notifications
      DB_USERNAME: notifications
      DB_PASSWORD: notifications
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_KEY: change-me-in-prod
      ALLOWED_ORIGINS: http://localhost:8080
    ports:
      - "8080:8080"

volumes:
  pgdata:
